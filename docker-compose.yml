version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: aios
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aios_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://aios:password@db:5432/aios_db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - db
    volumes:
      - .:/app

  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=password
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
