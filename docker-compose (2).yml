version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: aios-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/aios
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - db
      - ollama
    networks:
      - aios-network

  agents:
    build:
      context: .
      dockerfile: docker/agents.Dockerfile
    container_name: aios-agents
    volumes:
      - .:/app
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/aios
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - db
      - backend
    networks:
      - aios-network
    command: ["python", "-m", "agents.task_agent"] # Example command

  db:
    image: postgres:15-alpine
    container_name: aios-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=aios
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aios-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: aios-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - aios-network
    # GPU support (optional, requires nvidia-container-toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  n8n:
    image: n8nio/n8n:latest
    container_name: aios-n8n
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=http://n8n:5678/
      - N8N_HOST=n8n
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=postgres
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - db
    networks:
      - aios-network

networks:
  aios-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  n8n_data:
